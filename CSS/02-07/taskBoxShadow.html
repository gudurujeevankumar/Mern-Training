<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card - Box shadow Task</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montenegrin+Gothic+One&display=swap" rel="stylesheet">
    <style>
        * {
            background-color: black;
        }

        p {
            height: 200px;
            width: 300px;
            background-color: deeppink;
            margin: 300px auto;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0px 0px 10px 5px white;
            color: white;
            font-family: "Montenegrin Gothic One", serif;
            font-weight: 400;
            font-style: normal;
            text-align: justify;
        }
    </style>
</head>

<body>
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Sint accusamus atque quam cum dolor, harum sit in
        aliquid corporis ipsam! Lorem ipsum dolor sit, amet consectetur adipisicing elit. Aut repellendus neque magni
        blanditiis nostrum sapiente incidunt eos eaque id sed?
    </p>
</body>

</html>
