<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <style>
        .content{
            height:200px;
            width: 200px;
            background-color: orange;
            padding: 20px;
            border: 10px solid;
            box-sizing: content-box;
        }
        .border{
            height:200px;
            width: 200px;
            background-color: gray;
            padding: 20px;
            border: 10px solid;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="content">
        Content-Box
    </div> <br> <br>
    <div class="border">
        Border-box
    </div>
</body>
</html>
