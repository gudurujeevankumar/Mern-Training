<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border and Radius</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            background-color: antiquewhite;
        }

        .div-1 {
            border: solid 10px;
        }

        .div-2 {
            border: dashed 10px;
        }

        .div-3 {
            border: double 10px;
        }

        .div-4 {
            border: dotted 10px;
        }

        .div-5 {
            border: groove 10px green;
        }

        .div-6 {
            border: outset 10px blue;
        }

        .card {
            border-top: 2px solid deeppink;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px 1px;
        }
    </style>
</head>
<body>
    <div class="div-1">1</div> <br>
    <div class="div-2">2</div> <br>
    <div class="div-3">3</div> <br>
    <div class="div-4">4</div> <br>
    <div class="div-5">5</div> <br>
    <div class="div-6">6</div> <br>

    <div class="card">Card</div>
</body>
</html>
