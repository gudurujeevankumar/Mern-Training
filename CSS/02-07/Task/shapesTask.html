<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shapes Task</title>
    <style>
        div {
            border: 1px solid;
            height:100px;
            width: 100px;
            display: inline-block;
            margin: 20px;
            text-align: center;
            padding: 10px;
        }

        .rectangle {
            width: 200px;
            height: 100px;
        }

        .circle {
            border-radius: 100%;
        }

        .oval {
            width: 200px;
            border-radius: 100%;
        }

        .eqtraingle{
            border-radius: 100px 100px 0px 0px;
        }

        .cylinder{
            border-radius: 50px;
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="square">square</div>
    <div class="rectangle">rectangle</div>
    <div class="circle">circle</div>
    <div class="oval">oval</div>
    <div class="eqtraingle">eqtraingle</div>
    <div class="l90traingle">L90traingle</div>
    <div class="r90traingle">r90traingle</div>
    <div class="revtraingle">revtraingle</div>
    <div class="cylinder">cylinder</div>
</body>
</html>
