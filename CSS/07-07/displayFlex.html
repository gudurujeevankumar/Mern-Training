<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Flex</title>
    <style>
        .container
        {
            height: 100vh;
            background-color: black;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
        }

        div{
            height: 100px;
            width: 100px;
        }
        .div-1{
            background-color: lightblue;
        }
        .div-2{
            background-color: lightcoral;
        }
        .div-3{
            background-color: lightseagreen;
        }
        .div-4{
            background-color: lightgreen;
        }
        .div-5{
            background-color: lightsalmon;
        }
        .div-6{
            background-color: lightseagreen;
        }
    </style>
</head>
<body>
    <section class="container">
        <div class="div-1"></div>
        <div class="div-2"></div>
        <div class="div-3"></div>
        <div class="div-4"></div>
        <div class="div-5"></div>
        <div class="div-6"></div>
    </section>
</body>
</html>
