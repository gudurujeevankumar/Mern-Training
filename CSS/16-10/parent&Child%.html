<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent and child percentage</title>
    <style> 
        .parent {
            width: 300px;
            height: 300px;
            background-color: red;
        }

        .child {
            width: 30%;
            height: 30%;
            background-color: aliceblue;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child">

        </div>
    </div>
</body>
</html>
