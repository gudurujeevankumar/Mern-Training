<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradients</title>
    <style>
        div {
            height: 300px;
            width: 300px;
            border: 1px solid;
        }
        .div-1 {
            /* background: linear-gradient(to top, red, green, gold, blue); */
            background: linear-gradient(to left, red, green, gold, blue);
        }

        .div-2 {
            background: repeating-conic-gradient(red 1% 2%, blue 2% 3%,orange 3% 4%,green 4% 5%);
            background: conic-gradient(red 0% 25%, blue 25% 50%,orange 50% 70%,green 70% 100%);

        }

        .div-3 {
            background: radial-gradient(red,blue,green,orange,brown,gray,purple,skyblue);
        }
    </style>
</head>

<body>
    <div class="div-1">

    </div>
    <div class="div-2">

    </div>
    <div class="div-3">

    </div>
</body>

</html>
