<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index</title>
    <style>
        div{
            height: 100px;
            width: 100px;
        }
        .div-1{
            background-color: lightcoral;
            position: absolute;
            z-index: 2;
        }
        .div-2{
            background-color: lightgreen;
            position: absolute;
            top: 50px;
            left: 50px;
            z-index: 1;
        }
        .div-3{
            background-color: goldenrod;
            position: absolute;
            top: 100px;
            left: 100px;
            z-index: 3;
        }
    </style>
</head>
<body>
    <div class="div-1">1</div>
    <div class="div-2">2</div>
    <div class="div-3">3</div>
</body>
</html>
