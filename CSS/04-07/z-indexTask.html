<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index Task</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            position: absolute;
            
        }
        .div-1{
            background-color: blueviolet;
            top: 160px;
            left: 160px;
            z-index: 3;
        }
        .div-2{
            background-color: maroon;
            left: 160px;
            top:40px;
        }
        .div-3{
            background-color: goldenrod;
            top: 100px;
            left: 100px;
        }
        .div-4{
            background-color: cyan;
            top: 160px;
            left: 30px;
            z-index: -3;
        }
        .div-5{
            background-color: darkcyan;
            top:40px;
            left: 30px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="div-1"></div>
    <div class="div-2"></div>
    <div class="div-3"></div>
    <div class="div-4"></div>
    <div class="div-5"></div>
</body>
</html>
