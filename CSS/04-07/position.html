<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        #parent{
            height: 300px;
            width: 300px;
            background-color: aquamarine;
            position: sticky;
            margin: 300px;
            top: 100px;
            left: 100px;
        }
        
        #child{
            height: 100px;
            width: 100px;
            background-color: gray;
            position: absolute;
            top: 20px;
            left: 20px;
        }

    </style>
</head>
<body>
    <div id="parent">
        <div id="child"></div>
    </div>
</body>
</html>
