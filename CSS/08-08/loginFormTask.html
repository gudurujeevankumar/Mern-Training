<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form Task</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        body {
            background: linear-gradient(to right, #61c5ec, #a900f1);
            font-size: 17px;
        }

        form {
            height: 400px;
            width: 400px;
            background-color: aliceblue;
            margin: 200px auto;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            padding: 40px;
        }
        .input-container{
            height: 80%;
            width: 90%;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
        }
        label{
            margin-bottom: -10px;
        }
        input{
            height: 40px;
            font-size: 20px;
        }

        input[type ="submit"]{
            background: linear-gradient(to right, #61c5ec, #a900f1);
            border: none;
            color: white;
        }

        a{
            text-decoration: none;
            color: #23b2ea;
        }
    </style>
</head>

<body>
    <form action="">
        <h1>Login Form</h1>
        <div class="input-container">
            <label for="">Email or Phone</label>
            <input type="text">

            <label for="">Password</label>
            <input type="password">

            <a href="">Forgot Password?</a>

            <input type="submit" value="Login">

            <p>Not a member? <a href="">Signup now</a></p>
        </div>
    </form>
</body>

</html>
