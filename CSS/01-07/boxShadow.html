<html lang="en">
<head>

    <title>Box Shadow</title>
    <style>
        div{
            background-color: orange;
            height: 150px;
            width: 250px;
        }
        img {
            height:100px;
            width: 200px;
            box-shadow: 10px 10px 10px skyblue , 10px 20px 10px ;
        }
    </style>
</head>
<body>

</html>
