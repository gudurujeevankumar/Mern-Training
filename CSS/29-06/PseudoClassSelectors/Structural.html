<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structural Pseudo Class Selectors</title>
    <style>
        li:first-child{
            color: red;
        }
        li:last-child{
            color: green;
        }
        li:nth-child(5){
            color: blue;
        }
        li:nth-last-child(2){
            color: orange;
        }
        li:nth-child(even){
            background-color: pink;
        }
        li:nth-last-child(even){
            background-color: skyblue;
        }
    </style>
</head>
<body>
    <!-- first child, last child, nth child(number/even/odd), nth last child(number/even/odd) -->
    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JS</li>
        <li>React.js</li>
        <li>React Native</li>
        <li>Python</li>
        <li>Django</li>
        <li>SQL</li>
    </ol>
</body>
</html>
