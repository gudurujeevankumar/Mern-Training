<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psuedo Class Selectors</title>
    <style>
        h1:hover{
            color: orange;
        }
        a:link{
            color: green;
        }
        a:active{
            color: brown;
        }
        a:visited{
            color: cyan;
        }
        a:hover{
            color: black;
        }
        a:visited:hover{
            color: red;
        }
        input:focus{
            background-color: gray;
            color:white;
        }
        a:hover{
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <h1>Psuedo Class Selectors</h1>
    <a href="https://www.amazon.com">Amazon</a>
    <a href="https://www.swiggy.com">Swiggy</a>
    <a href="https://www.qspiders.com">Qspiders</a>
    <input type="text">
</body>
</html>
