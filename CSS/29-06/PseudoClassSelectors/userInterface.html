<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Interface Pseudo Class Selectors</title>
    <style>
        input{
            background-color: bisque;
        }
        input:disabled{
            background-color: lightcoral;
        }
        input:checked{
            outline: solid 5px rebeccapurple;
        }
    </style>
</head>
<body>
    <input type="text">
    <input type="text" disabled placeholder="this was disabled">
    <input type="text">

    <input type="radio" name="" id="">
    <input type="checkbox" name="" id="">
</body>
</html>
