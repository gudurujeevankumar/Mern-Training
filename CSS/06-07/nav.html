<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav bar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        nav {
            text-align: center;
        }
        a{
            color: black;
            text-decoration: none;
            font-size: 20px;
            margin-left: 20px;
            font-family: cursive;
        }
        a:hover
        {
            color: orange;
            text-shadow: 0px 1px 1px black;
        }
    </style>
</head>

<body>
    <nav>
        <a href=""><i class="fa-regular fa-house"></i> Home</a>
        <a href=""><i class="fa-solid fa-address-book"></i> Contact</a>
        <a href=""><i class="fa-solid fa-graduation-cap"></i> Placements</a>
        <a href=""><i class="fa-solid fa-map-location"></i> Enquiry</a>
        <hr>
    </nav>
</body>

</html>
