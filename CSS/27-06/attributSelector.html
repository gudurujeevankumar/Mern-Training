<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector</title>
    <style>
        a {
            color: green;
        }
        a[target] {
            color:orange;
        }
        a[target="_blank"]{
            color: grey;
        }
    </style>
</head>
<body>
    <a href="https://www.zomato.com">Zomato</a>
    <a href="http://www.youtube.com" target="_self">Youtube</a>
    <a href="http://www.Amazon.com" target="_blank">Amazon</a>
</body>
</html>
