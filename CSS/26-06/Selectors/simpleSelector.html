<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Selector</title>
    <style>
        h1 {
            background-color: orange;
        }
        #heading {
            background-color: black;
            color: whitesmoke;
        }
        .para {
            background-color: orange;
            color:green;
        }
        * {
            background-color: lightgoldenrodyellow;
        }
    </style>
</head>
<body>
    <h1>This element was style using element/tag selector</h1>
    <h1 id="heading">Styled by ID selector</h1>
    <p class="para"> style with class selctor name para</p>
    <h2 class="para"> style with class selctor name para</h2>
</body>
</html>
