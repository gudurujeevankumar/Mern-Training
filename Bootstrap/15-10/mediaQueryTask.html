<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Queries Task</title>
    <style>
        section {
            width: 100%;
            height: 100dvh;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        @media all and (max-width:800px) {
            section {
                display: flex;
                flex-direction: column-reverse;
                justify-content: space-evenly;
                align-items: center;
            }
        }
    </style>
</head>

<body>
    <section>
        <table border="1" cellspacing="0" cellpadding="20">
            <caption>Table 1</caption>
            <tr>
                <td>1</td>
                <td>2</td>
                <td>3</td>
            </tr>
            <tr>
                <td>5</td>
                <td>6</td>
                <td>7</td>
            </tr>
            <tr>
                <td>8</td>
                <td>9</td>
                <td>0</td>
            </tr>
        </table>

        <table border="1" cellspacing="0" cellpadding="20">
            <caption>Table 2</caption>
            <tr>
                <td>1</td>

            </tr>

            </tr>
            <tr>

            </tr>

    </section>
</body>

</html>
