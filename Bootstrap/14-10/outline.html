<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outline</title>
    <style>
        div{
            height: 800px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img{
            height: 500px;
            outline-offset: 10px;
            outline: 10px solid gold;
            border: 10px solid blueviolet;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div>
        <img src="https://img.magnific.com/free-vector/happy-ram-navami-indian-festival-landscape-background-with-lord-rama_1055-23719.jpg?semt=ais_hybrid&w=740&q=80" alt="">
    </div>
</body>
</html>
