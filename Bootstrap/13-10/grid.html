<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid</title>
    <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css">
</head>
<body>
    <section class="container-fluid">
        <div class="row">
            <div class="col-1 bg-warning">Card</div>
            <div class="col-1 bg-primary">Card</div>
            <div class="col-1 bg-secondary text-light">Card</div>
            <div class="col-1 bg-info">Card</div>
            <div class="col-1 bg-danger">Card</div>
            <div class="col-1 bg-success text-light">Card</div>
            <div class="col-1 bg-dark text-light">Card</div>
            <div class="col-1 bg-light">Card</div>
            <div class="col-1 bg-warning">Card</div>
            <div class="col-1 bg-secondary text-white">Card</div>
            <div class="col-1 bg-danger">Card</div>
            <div class="col-1 bg-warning">Card</div>
        </div> <br>

        <div class="row">
            <div class="col-2 bg-dark text-light">Card</div>
            <div class="col-2 bg-light">Card</div>
            <div class="col-2 bg-warning">Card</div>
            <div class="col-2 bg-secondary text-white">Card</div>
            <div class="col-2 bg-danger">Card</div>
            <div class="col-2 bg-warning">Card</div>
        </div> <br>

        <div class="row ">
            <div class="col-3 bg-danger">Card</div>
            <div class="col-3 bg-success text-light">Card</div>
            <div class="col-3 bg-dark text-light">Card</div>
            <div class="col-3 bg-light">Card</div>
        </div> <br>

        <div class="row ">
            <div class="col-4 bg-success text-light">Card</div>
            <div class="col-4 bg-warning ">Card</div>
            <div class="col-4 bg-dark ">Card</div>
        </div> <br>
    </section>
</body>
</html>
