<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unary Operator</title>
    <script>
        let n = 5.3;
        let m = 4.7;

        n = n++ * ++m / n++ + m--
        console.log(n++)

        m = ++n / m--
        console.log(n,m)

        // let n = 1;

        // console.log(n++);
        // console.log(n);
    </script>
</head>
<body>
    <h1>Unary practice</h1>
</body>
