<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unary operators</title>
    <script>
        // post incriement
        let a = 1;
        a = a++;
        console.log(a);

        let b = 1;
        b = ++b;
        console.log(b);

        let n = 5;
        console.log(n++);
        console.log(n);

        let j = 7;
        console.log(++j);
        console.log(j);
    </script>
</head>
<body>
    <h1>Unary Operators</h1>
</body>
</html>
