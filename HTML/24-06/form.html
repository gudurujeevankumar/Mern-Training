<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input Tags</title>
</head>
<body>
    <form action="">
        <fieldset>
            <label for="range">Select Range: </label>
            <input type="range" id="range" name="range"> <br> <br>

            <label for="file">Upload file</label>
            <input type="file" name="" id="file"> <br><br>

            <label for="date">Date: </label>
            <input type="date" id="date"> <br> <br>

            <label for="month">Month</label>
            <input type="month" name="" id="month"> <br> <br>

            <label for="week">Week:</label>
            <input type="week" id="week"> <br> <br>

            <label for="time">Time:</label>
            <input type="time" name="" id="time"> <br> <br>

            <label for="url">url:</label>
            <input type="url" name="" id="url"> <br> <br>

            <input type="submit" value="Submit">
        </fieldset>
    </form>
</body>
</html>
