<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="icon" href="https://lh3.googleusercontent.com/ogw/AF2bZyi48pnU4q6G1o9mBEyiSkGEpSBlyldDKOfjDH12kXaBg5Q=s64-c-mo">
</head>
<body>
    <form action="">
        <input type="file" name="files" id="" accept="image/*, .pdf," multiple>
        <br><br>
        <input type="text" name="disabled" id="" value="This input is disabled" disabled>
        <br><br>
        <input type="text" name="ro" id="" readonly value="Read Only Text">
        <br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
