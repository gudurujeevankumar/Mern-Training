<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Row and Col Spans</title>
</head>
<body>
    <table border="1">
        <thead>
            <th>Product</th>
            <th>Flavour</th>
        </thead>
        <tbody>
            <tr>
                <td rowspan="3">Milk</td>
                <td>Almond</td>
            </tr>

            <tr>
                <td>Mango</td>
            </tr>

            <tr>
                <td>chocolate</td>
            </tr>

            <tr>
                <td colspan="2">These are all exclusive flavours</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
