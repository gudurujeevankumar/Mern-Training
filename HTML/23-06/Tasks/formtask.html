<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Task</title>
</head>

<body>
    <form action="">

        <!-- <fieldset> -->
            <legend align="center">Registeration Form</legend>
            <table border="1" cellspacing="0" cellpadding="5" align="center">
                <tr>
                    <th><Label>First Name:</Label></th>
                    <td><input type="text" name="" id="" placeholder="Enter First Name"></td>
                </tr>

                <tr>
                    <th><Label>Last Name:</Label></th>
                    <td><input type="text" name="" id="" placeholder="Enter Last Name"></td>
                </tr>

                <tr>
                    <th><Label>Email:</Label></th>
                    <td><input type="email" name="" id="" placeholder="Enter Email"></td>
                </tr>

                <tr>
                    <th><Label>Phno:</Label></th>
                    <td><input type="number" name="" id="" placeholder="Enter Mobile Number"></td>
                </tr>

                <tr>
                    <th><Label>DOB:</Label></th>
                    <td><input type="date" name="" id=""></td>
                </tr>

                <tr>
                    <th><Label>Gender:</Label></th>
                    <td>
                        <label for="">Male</label>
                        <input type="radio" value="Male" name="Gender">

                        <label for="">Female</label>
                        <input type="radio" value="Female" name="Gender">

                        <label for="">Others</label>
                        <input type="radio" value="Others" name="Gender">
                    </td>
                </tr>

                <tr>
                    <th><label for="">Age:</label></th>
                    <td><input type="number"></td>
                </tr>

                <tr>
                    <th><label for="">Preferences:</label></th>
                    <td>
                        <label for="">Acrylic Painting</label>
                        <input type="checkbox" value="arcrylic" id="">

                        <label for="">Oil Painting</label>
                        <input type="checkbox" value="oil" id="">

                        <label for="">Water Colour Painting</label>
                        <input type="checkbox" value="water" id="">
                    </td>
                </tr>

                <tr>
                    <th><label for="">State:</label></th>
                    <td>
                        <select name="" id="">
                            <option value="AP">Andhra Pradesh</option>
                            <option value="AR">Arunachal Pradesh</option>
                            <option value="BR">Bihar</option>
                            <option value="CH">Chandighar</option>
                            <option value="HP">Himachal Pradesh</option>
                            <option value="KA">Karnataka</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <th><label for="">Food Items:</label></th>
                    <td>
                        <select name="" id="">
                            <option value="">South Rice Combo</option>
                            <option value="">Chineese</option>
                            <option value="">Roti</option>
                            <option value="">Sambhar Rice</option>
                            <option value="">Fried Rice</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <th><label for="">Bio:</label></th>
                    <td><textarea name="bio" id="bio-text" rows="10" cols="40"></textarea></td>
                </tr>

                <tr>
                    <td colspan="2">
                        <button type="reset">Reset</button>
                        <button type="submit">Submit</button>
                    </td>
                </tr>
            </table>
        <!-- </fieldset> -->


    </form>
</body>

</html>
